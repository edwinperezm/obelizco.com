[build]
  base = "obelizco_site_landingpage"  # Set the base directory where package.json is located
  command = "npm run build"  # Build the Next.js application
  publish = "out"  # Output directory for static export (relative to base directory)

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
